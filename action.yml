name: i18n.site
description: 'https://i18n.site'
inputs:
  token:
    description: 'Create token from https://i18n.site/token'
    required: true
    default: ''

runs:
  using: 'composite'
  steps:

    - name: Restore Cache /opt/bin
      uses: actions/cache/restore@v4
      with:
        path: /opt/bin
        key: ${{ runner.os }}-opt-bin

    - name: i18n.site
      shell: bash
      run: |
        tmp=$(mktemp -d)
        cd $tmp
        git clone https://github.com/i18n-site/github-action-i18n.site.git .
        mkdir -p /opt
        cd /opt
        $tmp/run.sh

    - name: Cache /opt/bin
      uses: actions/cache@v4
      with:
        path: /opt/bin
        key: ${{ runner.os }}-opt-bin
